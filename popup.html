<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Schedulo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <img src="icons/icon48.png" alt="Schedulo" class="brand-logo" />
      <span class="brand-name">Schedulo</span>
    </div>

    <nav class="tab-nav">
      <button class="tab-btn active" data-view="project">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M3 4.4h6M3 6h4.2M3 7.6h5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
        Project
      </button>
      <button class="tab-btn" data-view="kanban">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="3" height="10" rx="1" fill="currentColor"/><rect x="5" y="1" width="3" height="7" rx="1" fill="currentColor"/><rect x="9" y="1" width="2" height="5" rx="1" fill="currentColor"/></svg>
        Kanban
      </button>
      <button class="tab-btn" data-view="gantt">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="2" width="7" height="2" rx="1" fill="currentColor"/><rect x="3" y="5" width="8" height="2" rx="1" fill="currentColor"/><rect x="2" y="8" width="5" height="2" rx="1" fill="currentColor"/></svg>
        Gantt
      </button>
    </nav>

    <div class="timeline-switcher">
      <select id="timeline-select" class="timeline-select" aria-label="Active timeline"></select>
    </div>

    <button class="tb-btn" id="btn-edit-timeline" title="Edit active timeline">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M7.2 1.3l2.5 2.5-5.3 5.3H1.9V6.6l5.3-5.3z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      <span>Edit TL</span>
    </button>

    <button class="tb-btn" id="btn-export" title="Export board to Excel">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v5.4M3.4 4.9l2.1 2.2 2.1-2.2M1.6 8.5h7.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Export</span>
    </button>

    <button class="tb-btn" id="btn-add-col">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span id="add-btn-label">Add list</span>
    </button>
  </header>

  <!-- PROJECT VIEW -->
  <div class="view active" id="view-project">
    <div class="project-wrap">
      <div class="project-panel">
        <h2 class="project-title">Projects</h2>
        <p class="project-sub">Create a project, or pick one to jump straight into Kanban.</p>

        <div class="project-create-row">
          <input class="m-input project-input" id="project-name-input" placeholder="New project name..." maxlength="80" />
          <button class="btn-accent" id="project-create-btn">Create project</button>
        </div>

        <div class="project-list-wrap">
          <div class="project-list-head">
            <span class="m-label">All projects</span>
            <span class="project-count" id="project-count">0</span>
          </div>
          <div class="project-list" id="project-list"></div>
          <p class="project-empty" id="project-empty">No projects yet. Create your first project to continue.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- KANBAN VIEW -->
  <div class="view" id="view-kanban">
    <div class="board" id="board"></div>
  </div>

  <!-- GANTT VIEW -->
  <div class="view" id="view-gantt">
    <div class="gantt-toolbar">
      <div class="gantt-legend" id="gantt-legend"></div>
      <div class="gantt-zoom">
        <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
        <span class="zoom-label" id="zoom-label">Week</span>
        <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
      </div>
    </div>
    <div class="gantt-wrap" id="gantt-wrap">
      <div class="gantt-inner" id="gantt-inner"></div>
    </div>
    <p class="gantt-hint" id="gantt-hint"></p>
  </div>

  <!-- CARD MODAL -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-card">
      <div class="modal-header">
        <span class="modal-title" id="modal-heading">New card</span>
        <button class="modal-close" id="modal-close">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <input  class="m-input"    id="card-title-input" placeholder="Card title…"          maxlength="120" />
      <textarea class="m-textarea" id="card-desc-input"  placeholder="Description (optional)…" rows="2"></textarea>
      <div class="m-row">
        <div class="m-group">
          <span class="m-label">Label</span>
          <div class="label-swatches" id="label-swatches" role="radiogroup" aria-label="Label color">
            <button class="swatch" data-color="none"   style="background:transparent;border:1.5px dashed #555;color:#777;">×</button>
            <button class="swatch" data-color="yellow" style="background:#F7C948;"></button>
            <button class="swatch" data-color="teal"   style="background:#4ECDC4;"></button>
            <button class="swatch" data-color="coral"  style="background:#FF6B6B;"></button>
            <button class="swatch" data-color="blue"   style="background:#74B3F0;"></button>
            <button class="swatch" data-color="purple" style="background:#B78CF7;"></button>
            <button class="swatch" data-color="green"  style="background:#72C472;"></button>
          </div>
        </div>
        <div class="m-group">
          <label class="m-label" for="card-start-input">Start date</label>
          <input class="m-input short" id="card-start-input" type="date" />
        </div>
        <div class="m-group">
          <label class="m-label" for="card-due-input">Due date</label>
          <input class="m-input short" id="card-due-input" type="date" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost"  id="modal-cancel">Cancel</button>
        <button class="btn-accent" id="modal-save">Save card</button>
      </div>
    </div>
  </div>

  <!-- RENAME MODAL -->
  <div class="modal-overlay hidden" id="rename-overlay">
    <div class="modal small">
      <div class="modal-header">
        <span class="modal-title" id="rename-title">Rename</span>
        <button class="modal-close" id="rename-close">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <input class="m-input" id="rename-input" placeholder="List name…" maxlength="40" />
      <div class="modal-actions">
        <button class="btn-ghost"  id="rename-cancel">Cancel</button>
        <button class="btn-accent" id="rename-save">Rename</button>
      </div>
    </div>
  </div>

  <!-- TIMELINE SETTINGS MODAL -->
  <div class="modal-overlay hidden" id="timeline-overlay">
    <div class="modal" id="modal-timeline">
      <div class="modal-header">
        <span class="modal-title">Timeline settings</span>
        <button class="modal-close" id="timeline-close">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <label class="m-label" for="timeline-name-input">Timeline name</label>
      <input class="m-input" id="timeline-name-input" placeholder="Timeline name…" maxlength="60" />
      <div class="m-row">
        <div class="m-group">
          <label class="m-label" for="timeline-start-input">Start date</label>
          <input class="m-input short" id="timeline-start-input" type="date" />
        </div>
        <div class="m-group">
          <label class="m-label" for="timeline-due-input">Due date</label>
          <input class="m-input short" id="timeline-due-input" type="date" />
        </div>
      </div>
      <div class="m-group">
        <label class="m-label" for="timeline-delete-target">On delete</label>
        <select class="m-input" id="timeline-delete-target"></select>
        <p class="m-help" id="timeline-delete-help">Delete tasks permanently.</p>
      </div>
      <div class="tl-map" id="timeline-map-wrap">
        <span class="m-label">Move Task Mapping</span>
        <div class="tl-map-list" id="timeline-map-list"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost danger" id="timeline-delete">Delete timeline</button>
        <button class="btn-ghost" id="timeline-cancel">Cancel</button>
        <button class="btn-accent" id="timeline-save">Save timeline</button>
      </div>
    </div>
  </div>

  <script src="popup.core.js"></script>
  <script src="popup.kanban.js"></script>
  <script src="popup.gantt.js"></script>
  <script src="popup.modal.js"></script>
  <script src="popup.timeline.js"></script>
  <script src="popup.project.js"></script>
  <script src="popup.js"></script>
</body>
</html>
